<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>Friend Station</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <style>
        :root { --bg-dark: #000000; --bg-panel: #16181c; --bg-hover: #202327; --text-main: #e7e9ea; --text-sub: #71767b; --border: #2f3336; --accent: #2ecc71; --danger: #e74c3c; --success: #2ecc71; }
        *{margin:0;padding:0;box-sizing:border-box; -webkit-tap-highlight-color: transparent;} 
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg-dark);color:var(--text-main);height:100vh;overflow:hidden;display:flex;}
        
        .hidden{display:none!important} 
        ::-webkit-scrollbar { width: 6px; height: 6px; } ::-webkit-scrollbar-thumb { background: #3f4347; border-radius: 3px; } ::-webkit-scrollbar-track { background: transparent; }

        input,textarea { width:100%; padding:14px 16px; margin-bottom:10px; border:1px solid var(--border); border-radius:12px; background:var(--bg-panel); color:var(--text-main); outline:none; font-size:15px; transition:0.3s; } 
        input:focus { border-color:var(--accent); }
        button { padding:12px 20px; border:none; border-radius:12px; background:var(--accent); color:#fff; cursor:pointer; font-weight:600; font-size:15px; transition:0.3s; } 
        button:hover { transform: translateY(-2px); } button.danger { background:var(--danger); }
        button.icon-btn { padding:10px; border-radius:50%; width:44px; height:44px; display:inline-flex; align-items:center; justify-content:center; background:var(--bg-hover); color:var(--text-main); }
        
        .toast { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); background: var(--text-main); color: var(--bg-dark); padding: 12px 24px; border-radius: 30px; z-index: 10000; font-weight: bold; font-size: 14px; opacity: 0; transition: 0.3s; pointer-events: none; }
        .toast.show { opacity: 1; top: 30px; }

        #scr-auth, #scr-pending {width:100%;max-width:420px;margin:auto;background:var(--bg-panel);padding:40px 30px;border-radius:24px;border:1px solid var(--border);box-shadow:0 15px 50px rgba(0,0,0,0.8);}
        #scr-auth h2{text-align:center;margin-bottom:25px;font-family:cursive;font-size:2.2em;color:var(--accent);}
        .auth-link{background:none;color:var(--accent);text-decoration:none;font-size:14px;padding:10px 0;width:100%;text-align:center;display:block;} .auth-link:hover{text-decoration:underline;}
        .reg-step h3 { font-size: 1.1em; margin-bottom: 20px; color: var(--accent); text-align: center; } .reg-step button { margin-top: 15px; width: 100%; }

        .loader { margin:20px auto; border:4px solid var(--border); border-top:4px solid var(--accent); border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #scr-main{display:flex;width:100%;height:100%;position:relative;}
        .sidebar{width:240px;background:var(--bg-dark);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px;gap:10px;z-index:10;}
        .brand{font-size:22px;font-weight:bold;color:var(--accent);margin-bottom:25px;font-family:cursive;padding-left:10px;}
        .nav-btn{display:flex;align-items:center;gap:15px;background:transparent;color:var(--text-main);font-size:18px;padding:14px 15px;justify-content:flex-start;border-radius:25px;}
        .nav-btn:hover, .nav-btn.active{background:var(--bg-hover); color:var(--accent); font-weight:bold;} 
        @media(max-width: 768px){ .sidebar{width:70px;padding:20px 10px;align-items:center;} .brand, .nav-btn span{display:none;} .nav-btn{padding:12px;} }
        
        .list-panel{width:350px;background:var(--bg-dark);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:5;}
        .panel-header{padding:20px;font-size:1.4em;font-weight:bold;border-bottom:1px solid var(--border);background:rgba(0,0,0,0.8); position:sticky;top:0;z-index:2;}
        .scroll-area{flex:1;overflow-y:auto;}
        
        .room-item{padding:15px 20px;display:flex;align-items:center;gap:15px;cursor:pointer; border-bottom:1px solid var(--border);} .room-item:hover{background:var(--bg-hover);} 
        .room-item img{width:48px;height:48px;border-radius:50%;object-fit:cover;border:2px solid var(--border);}
        .online-badge{position:absolute;bottom:0;right:0;width:14px;height:14px;background:#2ecc71;border:2px solid var(--bg-dark);border-radius:50%;display:none;} .is-online .online-badge{display:block;}

        .main-panel-container{flex:1;position:relative;background:var(--bg-dark);display:flex;flex-direction:column;}
        .main-screen{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;background:var(--bg-dark);z-index:1;}
        .main-screen.active{z-index:2;}
        @media(max-width: 768px){ .list-panel{width:100%; position:absolute; left:70px; height:100%;} .main-panel-container{position:absolute; left:70px; width:calc(100% - 70px); height:100%; z-index:6; transform:translateX(100%); transition:transform 0.3s;} .main-panel-container.active{transform:translateX(0);} }

        .chat-header{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
        .chat-box{flex:1;padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:15px;}
        .msg-wrap{display:flex;flex-direction:column;max-width:75%;position:relative;} .my-msg{align-self:flex-end;} .other-msg{align-self:flex-start;}
        .msg{padding:12px 16px;border-radius:16px;font-size:15px;line-height:1.4;word-break:break-word;position:relative;} 
        .my-msg .msg{background:var(--accent);color:#fff;border-bottom-right-radius:4px;} .other-msg .msg{background:var(--bg-panel);border:1px solid var(--border);border-bottom-left-radius:4px;}
        .msg img{max-width:100%;border-radius:8px;margin-top:8px;}
        .msg-info{font-size:11px;color:var(--text-sub);margin-top:4px;display:flex;gap:5px;align-items:center;justify-content:flex-end;} .is-read{color:var(--accent);}
        .reactions{position:absolute;bottom:-10px;right:10px;background:var(--bg-panel);border:1px solid var(--border);border-radius:12px;padding:2px 6px;font-size:12px;display:none;z-index:3;}
        
        .chat-input-area{padding:15px 20px;background:var(--bg-dark);border-top:1px solid var(--border);display:flex;flex-direction:column;gap:5px;} 
        .chat-input-row{display:flex;align-items:center;gap:10px;}
        .chat-input-row input[type="text"]{margin:0;border-radius:24px;flex:1;}

        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:2000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(5px);}
        .modal{background:var(--bg-panel);padding:30px;border-radius:24px;border:1px solid var(--border);width:90%;max-width:400px;text-align:center;}
        
        #video-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:3000;display:flex;flex-direction:column;align-items:center;justify-content:center;}
        #remote-video{width:100%;height:100%;object-fit:cover;position:absolute;}
        #local-video{width:120px;height:160px;object-fit:cover;position:absolute;bottom:100px;right:20px;border-radius:12px;border:2px solid #fff;z-index:2;}
        .call-controls{position:absolute;bottom:30px;display:flex;gap:20px;z-index:3;}

        /* リアクションメニュー */
        .reaction-menu { position:absolute; background:var(--bg-panel); border:1px solid var(--border); border-radius:24px; padding:5px; display:flex; gap:5px; z-index:100; box-shadow:0 5px 15px rgba(0,0,0,0.5); }
        .react-btn { background:none; border:none; font-size:20px; cursor:pointer; padding:5px; transition:0.2s;} .react-btn:hover{transform:scale(1.3);}
    </style>
</head>
<body>

<div id="toast" class="toast"></div>

<!-- タイムアウト -->
<div id="modal-timeout" class="modal-overlay hidden">
    <div class="modal">
        <i class="fa-solid fa-clock" style="font-size:40px;color:var(--accent);margin-bottom:20px;"></i>
        <h3 style="margin-bottom:15px;">通信を切断しました</h3>
        <p style="color:var(--text-sub);font-size:14px;margin-bottom:20px;">3時間操作がなかったため、サーバー負荷軽減のため自動切断しました。</p>
        <button type="button" style="width:100%;" onclick="location.reload()">再接続する</button>
    </div>
</div>

<!-- 着信モーダル -->
<div id="modal-incoming" class="modal-overlay hidden">
    <div class="modal">
        <img id="inc-icon" src="./icon.jpeg" style="width:80px;height:80px;border-radius:50%;margin-bottom:15px;object-fit:cover;">
        <h3 id="inc-name" style="margin-bottom:10px;"></h3>
        <p id="inc-type" style="color:var(--accent);margin-bottom:20px;font-weight:bold;"></p>
        <div style="display:flex;gap:15px;">
            <button type="button" class="danger" style="flex:1;" onclick="answerCall(false)">拒否</button>
            <button type="button" class="success" style="flex:1;" onclick="answerCall(true)">応答</button>
        </div>
    </div>
</div>

<!-- ビデオ通話画面 -->
<div id="video-overlay" class="hidden">
    <video id="remote-video" autoplay playsinline></video>
    <video id="local-video" autoplay playsinline muted></video>
    <div class="call-controls">
        <button type="button" class="icon-btn" onclick="toggleMic()" id="btn-mic"><i class="fa-solid fa-microphone"></i></button>
        <button type="button" class="icon-btn" onclick="toggleCam()" id="btn-cam"><i class="fa-solid fa-video"></i></button>
        <button type="button" class="icon-btn danger" onclick="endCall()"><i class="fa-solid fa-phone-slash"></i></button>
    </div>
</div>

<div id="scr-auth">
    <h2>Friend Station</h2>
    <div id="auth-msg" style="color:var(--danger); margin-bottom:10px; text-align:center; display:none;"></div>
    <form id="form-login">
        <input type="text" id="l-user" placeholder="ユーザーID" required>
        <input type="password" id="l-pass" placeholder="パスワード" required>
        <button type="submit" id="btn-submit-login" style="width:100%;">ログイン</button>
        <button type="button" class="auth-link" onclick="toggleAuth('reg')">アカウント作成</button>
    </form>
    <form id="form-reg" class="hidden">
        <div id="step1" class="reg-step">
            <h3>まずは本人確認をします</h3>
            <div style="display:flex;gap:10px;"><input type="text" id="r-fn" placeholder="姓" required><input type="text" id="r-ln" placeholder="名" required></div>
            <button type="button" onclick="nextStep(2)">次へ</button><button type="button" class="auth-link" onclick="toggleAuth('login')">戻る</button>
        </div>
        <div id="step2" class="reg-step hidden">
            <h3>学校情報を入力してください</h3>
            <input type="text" id="r-school" placeholder="学校名" required>
            <div style="display:flex;gap:10px;"><input type="text" id="r-grade" placeholder="学年" required><input type="text" id="r-class" placeholder="組" required><input type="text" id="r-att" placeholder="出席番号" required></div>
            <button type="button" onclick="nextStep(3)">次へ</button><button type="button" class="auth-link" onclick="nextStep(1)">戻る</button>
        </div>
        <div id="step3" class="reg-step hidden">
            <h3>ユーザー設定をします</h3>
            <input type="text" id="r-user" placeholder="ユーザーID (半角英数字)" required>
            <input type="text" id="r-nick" placeholder="ニックネーム" required>
            <button type="button" onclick="nextStep(4)">次へ</button><button type="button" class="auth-link" onclick="nextStep(2)">戻る</button>
        </div>
        <div id="step4" class="reg-step hidden">
            <h3>パスワードとアイコン</h3>
            <input type="password" id="r-pass" placeholder="パスワード" required>
            <input type="date" id="r-birth" required>
            <p style="font-size:12px;color:var(--text-sub);margin-bottom:5px;">アイコン画像 (任意)</p>
            <input type="file" id="r-icon" accept="image/*" style="padding:10px;">
            <button type="submit" id="btn-submit-reg" style="width:100%;">登録</button><button type="button" class="auth-link" onclick="nextStep(3)">戻る</button>
        </div>
    </form>
</div>

<div id="scr-pending" class="hidden">
    <h2 style="color:var(--accent);margin-bottom:15px;font-size:2em;text-align:center;">承認待ち</h2>
    <div class="loader"></div>
    <p style="color:var(--text-main);margin-bottom:10px;text-align:center;font-weight:bold;">管理者の承認を待っています...</p>
    <button type="button" onclick="logout()" class="danger" style="width:100%;margin-top:20px;">キャンセル</button>
</div>

<div id="scr-main" class="hidden">
    <div class="sidebar">
        <div class="brand">Friend Station</div>
        <button class="nav-btn active" id="nav-chat" onclick="switchNav(event,'chat')"><i class="fa-solid fa-message"></i> <span>メッセージ</span></button>
        <button class="nav-btn" id="nav-search" onclick="switchNav(event,'search')"><i class="fa-solid fa-magnifying-glass"></i> <span>検索</span></button>
        <button class="nav-btn" id="nav-settings" onclick="switchMainPanel('settings')"><i class="fa-solid fa-gear"></i> <span>設定</span></button>
        <button class="nav-btn danger" onclick="logout()" style="margin-top:auto;color:#fff;"><i class="fa-solid fa-right-from-bracket"></i> <span>ログアウト</span></button>
    </div>

    <div class="list-panel" id="list-panel">
        <div id="panel-chat" class="scroll-area">
            <div class="panel-header">メッセージ</div>
            <div id="ui-rooms"></div>
        </div>
        <div id="panel-search" class="scroll-area hidden">
            <div class="panel-header">ユーザー検索</div>
            <div style="padding:15px;">
                <input type="text" id="s-query" placeholder="キーワード(オフライン検索対応)..." style="border-radius:20px;margin-bottom:15px;">
                <button type="button" onclick="execSearch()" style="width:100%;border-radius:20px;">検索</button>
            </div>
            <div id="ui-search-res"></div>
        </div>
    </div>

    <div class="main-panel-container" id="main-container">
        <div id="main-chat" class="main-screen active">
            <button id="btn-back-chat" class="hidden" onclick="closeChatMobile()" style="position:absolute;top:15px;left:15px;z-index:10;background:rgba(0,0,0,0.6);border-radius:50%;width:44px;height:44px;border:none;color:#fff;"><i class="fa-solid fa-arrow-left"></i></button>
            <div id="chat-empty" style="flex:1; display:flex; align-items:center; justify-content:center; color:var(--text-sub);">チャットを選択してください</div>
            <div id="chat-active" class="hidden" style="display:flex;flex-direction:column;height:100%;">
                <div class="chat-header">
                    <div style="display:flex;align-items:center;gap:15px;margin-left:45px;">
                        <div style="position:relative;"><img id="chat-target-icon" src="./icon.jpeg" style="width:40px;height:40px;border-radius:50%;object-fit:cover;"><div class="online-badge" id="chat-target-online"></div></div>
                        <div><h3 id="chat-title">相手</h3><span id="chat-status" style="font-size:12px;color:var(--text-sub);"></span></div>
                    </div>
                    <div style="display:flex;gap:10px;">
                        <button type="button" class="icon-btn" onclick="startCall(false)"><i class="fa-solid fa-phone"></i></button>
                        <button type="button" class="icon-btn" onclick="startCall(true)"><i class="fa-solid fa-video"></i></button>
                    </div>
                </div>
                <div class="chat-box" id="ui-msgs"></div>
                <div class="chat-input-area">
                    <div class="chat-input-row">
                        <label style="cursor:pointer;font-size:22px;color:var(--text-sub);margin-top:5px;"><i class="fa-solid fa-image"></i><input type="file" id="msg-img" accept="image/*" class="hidden" onchange="sendImage(this)"></label>
                        <input type="text" id="msg-input" placeholder="メッセージを入力..." autocomplete="off">
                        <button type="button" id="btn-send-msg" style="border-radius:24px;">送信</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="main-settings" class="main-screen hidden scroll-area" style="padding:40px;">
            <h2 style="margin-bottom:25px;border-bottom:1px solid var(--border);padding-bottom:15px;">プロフィール設定</h2>
            <div style="display:flex;align-items:center;gap:20px;margin-bottom:30px;">
                <img id="my-icon-preview" src="./icon.jpeg" style="width:80px;height:80px;border-radius:50%;object-fit:cover;border:2px solid var(--accent);">
                <label style="cursor:pointer;background:var(--bg-hover);padding:10px 15px;border-radius:20px;font-size:14px;">アイコン変更<input type="file" class="hidden" accept="image/*" onchange="updateIcon(this)"></label>
            </div>
            <p style="color:var(--text-sub);margin-bottom:20px;">ID: <strong id="my-id-disp" style="color:var(--text-main);"></strong></p>
            <div style="background:#fff;padding:10px;border-radius:10px;display:inline-block;margin-bottom:30px;"><canvas id="my-qr"></canvas></div>
            <div style="display:flex;gap:10px;margin-bottom:15px;"><input type="text" id="set-nick" placeholder="ニックネーム"><button onclick="updateProfile()">保存</button></div>
            <div style="border:1px solid var(--border); border-radius:16px; padding:16px; background:var(--bg-panel); margin-top:20px;">
                <h3 style="margin-bottom:12px; font-size:16px;">通知設定</h3>
                <label style="display:block; margin-bottom:10px;">着信音
                    <select id="settings-call-sound" style="margin-top:6px; width:100%; padding:10px; border-radius:10px; background:var(--bg-dark); color:var(--text-main); border:1px solid var(--border);">
                        <option value="call1.mp3">call1.mp3</option>
                        <option value="call2.mp3">call2.mp3</option>
                        <option value="call3.mp3">call3.mp3</option>
                    </select>
                    <button type="button" onclick="testSound('call')" style="margin-top:8px; padding:8px 12px; font-size:13px;">着信音をテスト</button>
                </label>
                <label style="display:block; margin-bottom:10px;">通知音
                    <select id="settings-notify-sound" style="margin-top:6px; width:100%; padding:10px; border-radius:10px; background:var(--bg-dark); color:var(--text-main); border:1px solid var(--border);">
                        <option value="tuuti1.mp3">tuuti1.mp3</option>
                        <option value="tuuti2.mp3">tuuti2.mp3</option>
                        <option value="tuuti3.mp3">tuuti3.mp3</option>
                    </select>
                    <button type="button" onclick="testSound('notify')" style="margin-top:8px; padding:8px 12px; font-size:13px;">通知音をテスト</button>
                </label>
                <label style="display:flex; align-items:center; gap:8px; margin-bottom:10px;">
                    <input type="checkbox" id="settings-mute-mode">
                    <span>消音モード</span>
                </label>
                <button type="button" onclick="saveSettings()" style="width:100%;">設定を保存</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    // 🔥 Firebase設定 (リージョン付きURL)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, set, get, update, onChildAdded, remove, onDisconnect, onValue, goOffline, off, push } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDVTNVO9gcXKQkauOF3NNZ36d2voyvGscA",
        authDomain: "study-station-8f0aa.firebaseapp.com",
        projectId: "study-station-8f0aa",
        databaseURL: "https://study-station-8f0aa-default-rtdb.asia-southeast1.firebasedatabase.app",
        storageBucket: "study-station-8f0aa.firebasestorage.app",
        messagingSenderId: "797605553593",
        appId: "1:797605553593:web:8a3ca412c47eaee25d4268"
    };
    const app = initializeApp(firebaseConfig);
    const dbFirebase = getDatabase(app);
    
    let myInfo = JSON.parse(localStorage.getItem('myInfo'));
    let currentRoom = null; let onlineStatusCache = {}; let dbLocal = null;
    let allUsersCache = {}; let pendingListener = null;
    let notificationCount = 0;
    let titleBlinkTimer = null;

    function getDefaultSettings() {
        return { callSound: 'call1.mp3', notifySound: 'tuuti1.mp3', muteMode: false };
    }

    function getUserSettings() {
        const base = myInfo?.settings || {};
        return { ...getDefaultSettings(), ...base };
    }

    function applySettingsToUI() {
        const settings = getUserSettings();
        const callSelect = document.getElementById('settings-call-sound');
        const notifySelect = document.getElementById('settings-notify-sound');
        const muteCheck = document.getElementById('settings-mute-mode');
        if (callSelect) callSelect.value = settings.callSound || 'call1.mp3';
        if (notifySelect) notifySelect.value = settings.notifySound || 'tuuti1.mp3';
        if (muteCheck) muteCheck.checked = !!settings.muteMode;
    }

    window.saveSettings = async () => {
        const settings = {
            callSound: document.getElementById('settings-call-sound')?.value || 'call1.mp3',
            notifySound: document.getElementById('settings-notify-sound')?.value || 'tuuti1.mp3',
            muteMode: !!document.getElementById('settings-mute-mode')?.checked
        };
        if (myInfo) {
            myInfo.settings = settings;
            localStorage.setItem('myInfo', JSON.stringify(myInfo));
            await update(ref(dbFirebase, `users/${myInfo.id}`), { settings });
        }
        showToast('通知設定を保存しました');
    };

    function stopTitleBlink() {
        if (titleBlinkTimer) {
            clearInterval(titleBlinkTimer);
            titleBlinkTimer = null;
        }
        document.title = 'Friend Station';
        notificationCount = 0;
    }

    function startTitleBlink() {
        if (document.hidden) {
            notificationCount += 1;
            if (!titleBlinkTimer) {
                titleBlinkTimer = setInterval(() => {
                    document.title = document.title === 'Friend Station' ? `新規通知(${notificationCount})` : 'Friend Station';
                }, 700);
            }
        }
    }

    window.testSound = kind => {
        const settings = getUserSettings();
        const fileName = kind === 'call' ? settings.callSound : settings.notifySound;
        const selectId = kind === 'call' ? 'settings-call-sound' : 'settings-notify-sound';
        const select = document.getElementById(selectId);
        if (select) {
            const chosen = select.value;
            const audio = new Audio(`./${chosen}`);
            audio.volume = 0.5;
            audio.play().catch(() => {});
            return;
        }
        const audio = new Audio(`./${fileName}`);
        audio.volume = 0.5;
        audio.play().catch(() => {});
    };

    function playSound(kind) {
        const settings = getUserSettings();
        if (settings.muteMode) return;
        const fileName = kind === 'call' ? settings.callSound : settings.notifySound;
        const audio = new Audio(`./${fileName}`);
        audio.volume = 0.5;
        audio.play().catch(() => {});
    }

    document.addEventListener('visibilitychange', () => {
        if (!document.hidden) stopTitleBlink();
    });
    window.addEventListener('focus', stopTitleBlink);

    // ★ 3時間放置で自動切断
    let idleTime = 0; const MAX_IDLE_TIME = 3 * 60 * 60 * 1000;
    const resetIdle = () => { idleTime = 0; };
    ['mousemove','keydown','touchstart','scroll'].forEach(e => document.addEventListener(e, resetIdle));
    setInterval(() => { idleTime += 60000; if(idleTime >= MAX_IDLE_TIME) { goOffline(dbFirebase); document.getElementById('modal-timeout').classList.remove('hidden'); } }, 60000);

    // ★ WebRTC (通話)
    let peerConnection = null; let localStream = null; let callSession = null; let isVideoCall = false;
    const servers = { iceServers: [{urls:'stun:stun.l.google.com:19302'}] };

    // ★ 画像リサイズ (アイコン用・送信画像用)
    function resizeImage(file, maxSize, callback) {
        const r = new FileReader();
        r.onload = e => {
            const img = new Image();
            img.onload = () => {
                const cv = document.createElement('canvas'); let w = img.width, h = img.height;
                if(w > maxSize || h > maxSize) { if(w > h) { h *= maxSize / w; w = maxSize; } else { w *= maxSize / h; h = maxSize; } }
                cv.width = w; cv.height = h; cv.getContext('2d').drawImage(img, 0, 0, w, h);
                callback(cv.toDataURL('image/jpeg', 0.6)); // 圧縮
            };
            img.src = e.target.result;
        };
        r.readAsDataURL(file);
    }

    // ★ IndexedDB 初期化 (Promise対応・確実に処理する)
    function initDB() {
        return new Promise((resolve, reject) => {
            const req = indexedDB.open('ChatDB', 2);
            req.onupgradeneeded = e => {
                const db = e.target.result;
                if(!db.objectStoreNames.contains('msgs')) {
                    const s = db.createObjectStore('msgs', {keyPath: 'id'});
                    s.createIndex('room', 'room', {unique: false});
                }
            };
            req.onsuccess = e => { dbLocal = e.target.result; resolve(); };
            req.onerror = e => { reject(e); };
        });
    }

    async function saveLocalMsg(m) {
        return new Promise((resolve, reject) => {
            const tx = dbLocal.transaction('msgs', 'readwrite');
            tx.objectStore('msgs').put(m);
            tx.oncomplete = () => { loadChatList(); resolve(); };
            tx.onerror = () => reject();
        });
    }

    async function updateLocalMsgField(msgId, field, value) {
        return new Promise(resolve => {
            const tx = dbLocal.transaction('msgs', 'readwrite');
            const store = tx.objectStore('msgs');
            const req = store.get(msgId);
            req.onsuccess = () => {
                const m = req.result; if(m) { m[field] = value; store.put(m); }
                resolve();
            };
        });
    }

    // UI操作
    window.showToast = msg => { const t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); };
    window.toggleAuth = m => { document.getElementById('form-login').classList.toggle('hidden', m!=='login'); document.getElementById('form-reg').classList.toggle('hidden', m!=='reg'); if(m==='reg') nextStep(1); };
    window.nextStep = n => { document.querySelectorAll('.reg-step').forEach(el=>el.classList.add('hidden')); document.getElementById('step'+n).classList.remove('hidden'); };
    window.switchNav = (evt, m) => { 
        document.querySelectorAll('.nav-btn').forEach(el=>el.classList.remove('active')); evt.currentTarget.classList.add('active');
        document.getElementById('panel-chat').classList.toggle('hidden', m!=='chat'); document.getElementById('panel-search').classList.toggle('hidden', m!=='search');
        switchMainPanel('chat');
    };
    window.switchMainPanel = p => { 
        document.querySelectorAll('.main-screen').forEach(el=>el.classList.add('hidden', 'active'));
        document.getElementById('main-'+p).classList.remove('hidden'); document.getElementById('main-'+p).classList.add('active');
        if(p==='chat'){ document.getElementById('chat-active').classList.toggle('hidden', !currentRoom); document.getElementById('chat-empty').classList.toggle('hidden', !!currentRoom); }
    };
    window.closeChatMobile = () => { document.getElementById('main-container').classList.remove('active'); };

    // 承認監視
    function startPendingMonitor(uid) {
        document.getElementById('scr-auth').classList.add('hidden'); document.getElementById('scr-pending').classList.remove('hidden');
        const statusRef = ref(dbFirebase, `users/${uid}/status`);
        const unsubscribe = onValue(statusRef, snap => {
            if(snap.val() === 'approved') {
                unsubscribe();
                get(ref(dbFirebase, `users/${uid}`)).then(uSnap => { myInfo = uSnap.val(); localStorage.setItem('myInfo', JSON.stringify(myInfo)); initApp(); });
            }
        });
    }

    // ログイン
    document.getElementById('form-login').onsubmit = async e => {
        e.preventDefault(); const btn=document.getElementById('btn-submit-login'); btn.innerText="認証中...";
        const uid = document.getElementById('l-user').value; const pass = document.getElementById('l-pass').value;
        const snap = await get(ref(dbFirebase, `users/${uid}`));
        btn.innerText="ログイン";
        if(snap.exists() && snap.val().password === pass) {
            if(snap.val().is_banned) return showToast('アカウントが停止されています');
            if(snap.val().status === 'pending') startPendingMonitor(uid);
            else { myInfo = snap.val(); localStorage.setItem('myInfo', JSON.stringify(myInfo)); initApp(); }
        } else { document.getElementById('auth-msg').innerText = "IDかパスワードが違います"; document.getElementById('auth-msg').style.display='block'; }
    };

    // 登録 (アイコンリサイズ対応)
    document.getElementById('form-reg').onsubmit = async e => {
        e.preventDefault(); const btn=document.getElementById('btn-submit-reg'); btn.innerText="登録中...";
        const uid = document.getElementById('r-user').value;
        const snap = await get(ref(dbFirebase, `users/${uid}`));
        if(snap.exists()) { btn.innerText="登録"; return showToast('そのIDは既に存在します'); }
        
        const file = document.getElementById('r-icon').files[0];
        const registerUser = async (iconBase64 = '') => {
            const user = { id: uid, username: uid, nickname: document.getElementById('r-nick').value, first_name: document.getElementById('r-fn').value, last_name: document.getElementById('r-ln').value, password: document.getElementById('r-pass').value, is_banned: 0, status: 'pending', icon: iconBase64 };
            await set(ref(dbFirebase, `users/${uid}`), user);
            startPendingMonitor(uid);
        };
        
        if(file) resizeImage(file, 150, registerUser); else registerUser();
    };

    window.logout = () => { if(myInfo) remove(ref(dbFirebase, `presence/${myInfo.id}`)); localStorage.clear(); location.reload(); };

    async function loadUsersOnce() {
        const snap = await get(ref(dbFirebase, 'users'));
        allUsersCache = snap.exists() ? snap.val() : {};
    }

    async function initApp() {
        document.getElementById('scr-auth').classList.add('hidden'); document.getElementById('scr-pending').classList.add('hidden'); document.getElementById('scr-main').classList.remove('hidden');
        document.getElementById('my-id-disp').innerText = myInfo.username; document.getElementById('set-nick').value = myInfo.nickname;
        if(myInfo.icon) document.getElementById('my-icon-preview').src = myInfo.icon;
        QRCode.toCanvas(document.getElementById('my-qr'), myInfo.username, {width:200, margin:2});
        applySettingsToUI();
        
        await initDB();
        await loadUsersOnce();
        loadChatList();

        // オンライン管理
        const myRef = ref(dbFirebase, `presence/${myInfo.id}`);
        onDisconnect(myRef).remove(); set(myRef, true);
        onValue(ref(dbFirebase, 'presence'), snap => { onlineStatusCache = snap.val()||{}; updateOnlineBadges(); });

        // ★ メッセージ受信 (確実に処理)
        onChildAdded(ref(dbFirebase, `queue/${myInfo.id}`), async snap => {
            const msg = snap.val();
            if(!msg || !msg.sender) { remove(snap.ref); return; }
            if(msg.sender !== myInfo.id) {
                playSound('notify');
                if (document.hidden) startTitleBlink();
            }
            msg.room = msg.sender || msg.room || currentRoom;
            await saveLocalMsg(msg);
            if(currentRoom === msg.sender) {
                displayMsg(msg);
                push(ref(dbFirebase, `read/${msg.sender}`), { msgId: msg.id, reader: myInfo.id, time: Date.now() });
                updateLocalMsgField(msg.id, 'read', true);
            }
            remove(snap.ref);
        });

        // 既読受信
        onChildAdded(ref(dbFirebase, `read/${myInfo.id}`), snap => {
            const data = snap.val();
            if(data && data.msgId) {
                updateLocalMsgField(data.msgId, 'read', true).then(() => {
                    const el = document.getElementById(`rd-${data.msgId}`); if(el) el.innerText = '既読';
                });
            }
            remove(snap.ref);
        });

        // リアクション受信
        onChildAdded(ref(dbFirebase, `react/${myInfo.id}`), snap => {
            const data = snap.val();
            if(data && data.msgId) {
                updateLocalMsgField(data.msgId, 'reaction', data.emoji).then(() => {
                    const el = document.getElementById(`react-${data.msgId}`);
                    if(el) { el.innerText = data.emoji; el.style.display = 'block'; }
                });
            }
            remove(snap.ref);
        });

        // ★ WebRTC シグナリング受信 (着信)
        onChildAdded(ref(dbFirebase, `webrtc/${myInfo.id}`), snap => {
            const data = snap.val();
            if(data.type === 'offer') {
                callSession = data.session; isVideoCall = data.video;
                playSound('call');
                if (document.hidden) startTitleBlink();
                document.getElementById('inc-name').innerText = allUsersCache[data.sender]?.nickname || '着信';
                document.getElementById('inc-icon').src = allUsersCache[data.sender]?.icon || './icon.jpeg';
                document.getElementById('inc-type').innerHTML = data.video ? '<i class="fa-solid fa-video"></i> ビデオ通話' : '<i class="fa-solid fa-phone"></i> 音声通話';
                document.getElementById('modal-incoming').classList.remove('hidden');
                
                peerConnection = new RTCPeerConnection(servers);
                peerConnection.setRemoteDescription(new RTCSessionDescription(data.sdp));
                peerConnection.onicecandidate = e => {
                    if(e && e.candidate && e.candidate.candidate) {
                        set(ref(dbFirebase, `webrtc/${data.sender}/${Date.now()}`), {
                            type: 'candidate',
                            candidate: e.candidate.toJSON(),
                            sender: myInfo.id
                        });
                    }
                };
                peerConnection.ontrack = e => { document.getElementById('remote-video').srcObject = e.streams[0]; };
                
                // 切断検知用
                onValue(ref(dbFirebase, `webrtc_hangup/${callSession}`), hSnap => { if(hSnap.val()) endCall(); });
            } 
            else if(data.type === 'answer' && peerConnection) { peerConnection.setRemoteDescription(new RTCSessionDescription(data.sdp)); }
            else if(data.type === 'candidate' && peerConnection) {
                if(data.candidate && data.candidate.candidate) {
                    peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate)).catch(e => console.error('ICE追加失敗:', e));
                }
            }
            remove(snap.ref);
        });

        // 管理者P2P履歴
        onChildAdded(ref(dbFirebase, `admin_cmd/${myInfo.id}`), snap => {
            if(snap.val().cmd === 'get_history') {
                const tx = dbLocal.transaction('msgs', 'readonly');
                tx.objectStore('msgs').getAll().onsuccess = e => { set(ref(dbFirebase, `admin_res/${snap.val().admin_id}/${myInfo.id}`), e.target.result); remove(snap.ref); };
            }
        });
    }

    function loadChatList() {
        if(!dbLocal) return;
        const tx = dbLocal.transaction('msgs', 'readonly');
        tx.objectStore('msgs').getAll().onsuccess = e => {
            const msgs = e.target.result; const lastMsgs = {};
            msgs.forEach(m => { lastMsgs[m.room] = m; });
            
            document.getElementById('ui-rooms').innerHTML = Object.keys(lastMsgs).map(uid => {
                const u = allUsersCache[uid]; if(!u || u.status !== 'approved') return '';
                const m = lastMsgs[uid];
                const lText = m.type === 'image' ? '[画像]' : m.text;
                const unread = (!m.read && m.sender !== myInfo.id) ? '<span style="color:var(--danger);font-weight:bold;margin-left:5px;">●</span>' : '';
                return `<div class="room-item" data-uid="${u.id}" onclick="openRoom('${u.id}', '${u.nickname}')">
                    <div style="position:relative;"><img src="${u.icon||'./icon.jpeg'}"><div class="online-badge"></div></div>
                    <div style="flex:1;"><b>${u.nickname}</b>${unread}<div style="font-size:13px;color:var(--text-sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${lText}</div></div>
                </div>`;
            }).join('');
            updateOnlineBadges();
        };
    }

    window.execSearch = () => {
        const q = document.getElementById('s-query').value.toLowerCase(); if(!q) return;
        let html = '';
        Object.values(allUsersCache).forEach(u => {
            if(u.id !== myInfo.id && u.status === 'approved' && (u.nickname.toLowerCase().includes(q) || u.username.toLowerCase().includes(q))) {
                html += `<div class="room-item" onclick="openRoom('${u.id}', '${u.nickname}')"><img src="${u.icon||'./icon.jpeg'}"><div><b>${u.nickname}</b><br><span style="font-size:12px;color:var(--text-sub);">@${u.username}</span></div></div>`;
            }
        });
        document.getElementById('ui-search-res').innerHTML = html || '<div style="padding:20px;text-align:center;color:var(--text-sub);">見つかりませんでした</div>';
    };

    function updateOnlineBadges() {
        document.querySelectorAll('.room-item').forEach(el => { const uid = el.dataset.uid; if(uid) { if(onlineStatusCache[uid]) el.classList.add('is-online'); else el.classList.remove('is-online'); } });
        if(currentRoom) {
            document.getElementById('chat-status').innerText = onlineStatusCache[currentRoom] ? 'オンライン' : 'オフライン';
            document.getElementById('chat-target-online').style.display = onlineStatusCache[currentRoom] ? 'block' : 'none';
        }
    }

    window.openRoom = (uid, uname) => {
        currentRoom = uid; document.getElementById('chat-title').innerText = uname; 
        document.getElementById('chat-target-icon').src = allUsersCache[uid]?.icon || './icon.jpeg'; updateOnlineBadges();
        document.getElementById('chat-active').classList.remove('hidden'); document.getElementById('chat-empty').classList.add('hidden');
        document.getElementById('ui-msgs').innerHTML = '';
        if(window.innerWidth <= 768) { document.getElementById('main-container').classList.add('active'); document.getElementById('btn-back-chat').classList.remove('hidden'); }

        const tx = dbLocal.transaction('msgs', 'readwrite');
        const store = tx.objectStore('msgs');
        store.index('room').getAll(uid).onsuccess = e => { 
            const msgs = e.target.result.sort((a,b)=>a.time-b.time);
            msgs.forEach(m => {
                displayMsg(m);
                // 開いたときに未読があれば既読にする
                if(!m.read && m.sender !== myInfo.id) {
                    m.read = true; store.put(m);
                    push(ref(dbFirebase, `read/${m.sender}`), { msgId: m.id, reader: myInfo.id, time: Date.now() });
                }
            });
            loadChatList(); // バッジ消去
        };
    };

    function displayMsg(m) {
        const isMe = m.sender === myInfo.id; const cls = isMe ? 'my-msg' : 'other-msg';
        const d = new Date(m.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        const rd = isMe ? `<span class="is-read" id="rd-${m.id}">${m.read?'既読':''}</span>` : '';
        const content = m.type === 'image' ? `<img src="${m.text}">` : m.text.replace(/</g,"&lt;");
        const react = `<div class="reactions" id="react-${m.id}" style="display:${m.reaction?'block':'none'}">${m.reaction||''}</div>`;
        const actionHtml = !isMe ? `<div class="reaction-menu hidden" id="rmenu-${m.id}"><button class="react-btn" onclick="sendReact('${m.id}','❤️')">❤️</button><button class="react-btn" onclick="sendReact('${m.id}','👍')">👍</button></div>` : '';
        
        const html = `<div class="msg-wrap ${cls}" id="wrap-${m.id}">
                        ${actionHtml}
                        <div class="msg" oncontextmenu="event.preventDefault(); document.getElementById('rmenu-${m.id}').classList.toggle('hidden')">${content}${react}</div>
                        <div class="msg-info">${rd} ${d}</div>
                      </div>`;
        document.getElementById('ui-msgs').insertAdjacentHTML('beforeend', html);
        document.getElementById('ui-msgs').scrollTop = document.getElementById('ui-msgs').scrollHeight;
    }

    // リアクション送信
    window.sendReact = (msgId, emoji) => {
        document.getElementById(`rmenu-${msgId}`).classList.add('hidden');
        push(ref(dbFirebase, `react/${currentRoom}`), { msgId, emoji, sender: myInfo.id, time: Date.now() });
        updateLocalMsgField(msgId, 'reaction', emoji);
        const el = document.getElementById(`react-${msgId}`); if(el){ el.innerText=emoji; el.style.display='block'; }
    };

    // テキスト送信
    document.getElementById('btn-send-msg').onclick = () => {
        const txt = document.getElementById('msg-input').value.trim(); if(!txt || !currentRoom) return;
        const msg = { id: Date.now().toString(), room: currentRoom, sender: myInfo.id, senderName: myInfo.nickname, text: txt, type: 'text', time: Date.now(), read: false };
        displayMsg(msg); saveLocalMsg(msg); document.getElementById('msg-input').value = '';
        push(ref(dbFirebase, `queue/${currentRoom}`), msg);
    };

    // 画像送信 (Base64化してP2P送信・IndexedDB保存)
    window.sendImage = inp => {
        const file = inp.files[0]; if(!file || !currentRoom) return;
        resizeImage(file, 800, base64 => {
            const msg = { id: Date.now().toString(), room: currentRoom, sender: myInfo.id, senderName: myInfo.nickname, text: base64, type: 'image', time: Date.now(), read: false };
            displayMsg(msg); saveLocalMsg(msg);
            push(ref(dbFirebase, `queue/${currentRoom}`), msg); 
        });
        inp.value = '';
    };

    document.getElementById('msg-input').onkeydown = e => { if(e.key === 'Enter') document.getElementById('btn-send-msg').click(); };

    // ★ 通話機能 (WebRTC 発信)
    window.startCall = async (video) => {
        if(!currentRoom || !onlineStatusCache[currentRoom]) return showToast("相手がオフラインです");
        isVideoCall = video; callSession = 'call_' + Date.now();
        document.getElementById('video-overlay').classList.remove('hidden');
        document.getElementById('local-video').style.display = video ? 'block' : 'none';
        
        localStream = await navigator.mediaDevices.getUserMedia({video: video, audio: true});
        document.getElementById('local-video').srcObject = localStream;
        
        peerConnection = new RTCPeerConnection(servers);
        localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
        
        peerConnection.onicecandidate = e => {
            if(e && e.candidate && e.candidate.candidate) {
                set(ref(dbFirebase, `webrtc/${currentRoom}/${Date.now()}`), {
                    type: 'candidate',
                    candidate: e.candidate.toJSON(),
                    sender: myInfo.id
                });
            }
        };
        peerConnection.ontrack = e => { document.getElementById('remote-video').srcObject = e.streams[0]; };
        
        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        set(ref(dbFirebase, `webrtc/${currentRoom}/${Date.now()}`), { type: 'offer', sdp: offer, sender: myInfo.id, video: video, session: callSession });
        
        onValue(ref(dbFirebase, `webrtc_hangup/${callSession}`), snap => { if(snap.val()) endCall(); });
    };

    // ★ 通話応答
    window.answerCall = async (accept) => {
        document.getElementById('modal-incoming').classList.add('hidden');
        if(!accept) { set(ref(dbFirebase, `webrtc_hangup/${callSession}`), true); return; }
        
        document.getElementById('video-overlay').classList.remove('hidden');
        document.getElementById('local-video').style.display = isVideoCall ? 'block' : 'none';
        
        localStream = await navigator.mediaDevices.getUserMedia({video: isVideoCall, audio: true});
        document.getElementById('local-video').srcObject = localStream;
        localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
        
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);
        set(ref(dbFirebase, `webrtc/${currentRoom}/${Date.now()}`), { type: 'answer', sdp: answer, sender: myInfo.id });
    };

    window.endCall = () => {
        if(callSession) set(ref(dbFirebase, `webrtc_hangup/${callSession}`), true);
        document.getElementById('video-overlay').classList.add('hidden');
        if(peerConnection) { peerConnection.close(); peerConnection = null; }
        if(localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
        document.getElementById('remote-video').srcObject = null;
        callSession = null;
    };
    window.toggleMic = () => { const t = localStream?.getAudioTracks()[0]; if(t) { t.enabled = !t.enabled; document.getElementById('btn-mic').classList.toggle('danger', !t.enabled); } };
    window.toggleCam = () => { const t = localStream?.getVideoTracks()[0]; if(t) { t.enabled = !t.enabled; document.getElementById('btn-cam').classList.toggle('danger', !t.enabled); } };

    // プロフィール変更 (アイコン含む)
    window.updateIcon = inp => {
        const file = inp.files[0]; if(!file) return;
        resizeImage(file, 150, base64 => { document.getElementById('my-icon-preview').src = base64; myInfo.icon = base64; });
    };
    window.updateProfile = async () => {
        const nick = document.getElementById('set-nick').value;
        const settings = getUserSettings();
        await update(ref(dbFirebase, `users/${myInfo.id}`), { nickname: nick, icon: myInfo.icon || '', settings });
        myInfo.nickname = nick; myInfo.settings = settings; localStorage.setItem('myInfo', JSON.stringify(myInfo)); showToast('保存しました');
    };

    if(myInfo) { if(myInfo.status === 'pending') startPendingMonitor(myInfo.id); else initApp(); }
</script>
</body>
</html>

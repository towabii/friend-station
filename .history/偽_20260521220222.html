<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中学5教科 オールインワン学習アプリ</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #f5a623;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --success-color: #2ec4b6;
            --error-color: #e71d36;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding-bottom: 60px;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            padding: 1rem;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 1000px;
            margin: 20px auto;
            padding: 0 15px;
        }

        /* ナビゲーション・選択画面 */
        .selector-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .flex-container {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        select {
            flex: 1;
            min-width: 200px;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 6px;
            background-color: white;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        select:focus {
            border-color: var(--primary-color);
            outline: none;
        }

        /* メインコンテンツエリア */
        .main-content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .main-content {
                grid-template-columns: 1fr 1fr;
            }
        }

        .card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        h2 {
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 8px;
            margin-bottom: 15px;
        }

        h3 {
            margin-bottom: 10px;
            color: #555;
        }

        /* 解説パート */
        .lecture-text {
            font-size: 16px;
            white-space: pre-wrap;
            background: #f9f9f9;
            padding: 15px;
            border-left: 4px solid var(--primary-color);
            border-radius: 4px;
        }

        /* クイズパート */
        .quiz-option {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #fff;
            border: 2px solid #ddd;
            border-radius: 6px;
            text-align: left;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quiz-option:hover {
            background: #f0f7ff;
            border-color: var(--primary-color);
        }

        .quiz-option.correct {
            background-color: #e8f8f5;
            border-color: var(--success-color);
            color: #0e6251;
        }

        .quiz-option.incorrect {
            background-color: #fdebd0;
            border-color: var(--error-color);
            color: #78281f;
        }

        .feedback {
            margin-top: 15px;
            padding: 15px;
            border-radius: 6px;
            font-weight: bold;
            display: none;
        }

        .feedback.success {
            background-color: #d4edda;
            color: #155724;
            display: block;
        }

        .feedback.error {
            background-color: #f8d7da;
            color: #721c24;
            display: block;
        }

        /* 進捗管理 */
        .progress-container {
            margin-top: 20px;
            background: #eee;
            border-radius: 10px;
            height: 20px;
            overflow: hidden;
        }

        .progress-bar {
            background: var(--success-color);
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }

        /* ボタン */
        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<header>
    <h1>中学5教科 オールインワン学習マスター</h1>
    <p>中1〜中3の全課程を網羅</p>
</header>

<div class="container">
    <section class="selector-section">
        <div class="flex-container">
            <select id="grade-select">
                <option value="">学年を選択してください</option>
                <option value="1">中学1年生</option>
                <option value="2">中学2年生</option>
                <option value="3">中学3年生</option>
            </select>

            <select id="subject-select" disabled>
                <option value="">教科を選択してください</option>
                <option value="kokugo">国語</option>
                <option value="suugaku">数学</option>
                <option value="eigo">英語</option>
                <option value="rika">理科</option>
                <option value="shakai">社会</option>
            </select>
        </div>
        <div class="flex-container">
            <select id="chapter-select" disabled>
                <option value="">章を選択してください</option>
            </select>

            <select id="section-select" disabled>
                <option value="">節を選択してください</option>
            </select>
        </div>
    </section>

    <main id="learning-area" class="main-content hidden">
        <section class="card">
            <h2 id="lecture-title">章・節タイトル</h2>
            <h3>【要点解説】</h3>
            <div id="lecture-content" class="lecture-text">
                ここに解説が展開されます。
            </div>
        </section>

        <section class="card">
            <h2>確認テスト</h2>
            <div id="quiz-area">
                <p id="quiz-question" style="font-weight: bold; margin-bottom: 15px;">問題がここに表示されます。</p>
                <div id="quiz-options">
                    </div>
                <div id="quiz-feedback" class="feedback"></div>
                <button id="next-btn" class="btn hidden">次の問題へ / 完了</button>
            </div>
        </section>

        <section class="card full-width">
            <h2>学習進捗度</h2>
            <p id="progress-text">現在の節の達成度: 0%</p>
            <div class="progress-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
        </section>
    </main>
</div>

    const quizFeedback = document.getElementById("quiz-feedback");
    const nextBtn = document.getElementById("next-btn");
    
    const progressBar = document.getElementById("progress-bar");
    const progressText = document.getElementById("progress-text");

    let currentQuizData = null;

    // 学年選択時のイベント
    gradeSelect.addEventListener("change", () => {
        resetSelect(subjectSelect);
        resetSelect(chapterSelect);
        resetSelect(sectionSelect);
        learningArea.classList.add("hidden");

        if (gradeSelect.value) {
            subjectSelect.disabled = false;
        } else {
            subjectSelect.disabled = true;
        }
    });

    // 教科選択時のイベント
    subjectSelect.addEventListener("change", () => {
        resetSelect(chapterSelect);
        resetSelect(sectionSelect);
        learningArea.classList.add("hidden");

        const grade = gradeSelect.value;
        const subject = subjectSelect.value;

        if (grade && subject && curriculumData[grade][subject]) {
            chapterSelect.disabled = false;
            curriculumData[grade][subject].forEach((chap, index) => {
                const opt = document.createElement("option");
                opt.value = index;
                opt.textContent = chap.chapter;
                chapterSelect.appendChild(opt);
            });
        } else {
            chapterSelect.disabled = true;
        }
    });

    // 章選択時のイベント
    chapterSelect.addEventListener("change", () => {
        resetSelect(sectionSelect);
        learningArea.classList.add("hidden");

        const grade = gradeSelect.value;
        const subject = subjectSelect.value;
        const chapIndex = chapterSelect.value;

        if (chapIndex !== "") {
            sectionSelect.disabled = false;
            const sections = curriculumData[grade][subject][chapIndex].sections;
            sections.forEach((sec, index) => {
                const opt = document.createElement("option");
                opt.value = index;
                opt.textContent = sec.title;
                sectionSelect.appendChild(opt);
            });
        } else {
            sectionSelect.disabled = true;
        }
    });

    // 節選択時のイベント（ここで画面を描画）
    sectionSelect.addEventListener("change", () => {
        const grade = gradeSelect.value;
        const subject = subjectSelect.value;
        const chapIndex = chapterSelect.value;
        const secIndex = sectionSelect.value;

        if (secIndex !== "") {
            const data = curriculumData[grade][subject][chapIndex].sections[secIndex];
            renderSection(data);
            learningArea.classList.remove("hidden");
            updateProgress(0); // リセット
        } else {
            learningArea.classList.add("hidden");
        }
    });

    // セレクトボックス初期化用関数
    function resetSelect(selectElement) {
        selectElement.innerHTML = `<option value="">${selectElement.options[0].textContent}</option>`;
        selectElement.disabled = true;
    }

    // 選択された節の内容を描画
    function renderSection(sectionData) {
        // 解説の更新
        lectureTitle.textContent = sectionData.title;
        lectureContent.textContent = sectionData.content;

        // クイズの更新
        currentQuizData = sectionData.quiz;
        quizQuestion.textContent = currentQuizData.question;
        quizOptions.innerHTML = "";
        quizFeedback.className = "feedback";
        quizFeedback.textContent = "";
        nextBtn.classList.add("hidden");

        // 選択肢の動的生成
        currentQuizData.options.forEach((optionText, index) => {
            const button = document.createElement("button");
            button.className = "quiz-option";
            button.textContent = `${index + 1}. ${optionText}`;
            button.addEventListener("click", () => checkAnswer(index, button));
            quizOptions.appendChild(button);
        });
    }

    // クイズの正誤判定
    function checkAnswer(selectedIndex, clickedButton) {
        const buttons = quizOptions.querySelectorAll(".quiz-option");
        // 一度答えたら他のボタンを押せなくする
        buttons.forEach(btn => btn.disabled = true);

        if (selectedIndex === currentQuizData.answer) {
            clickedButton.classList.add("correct");
            quizFeedback.textContent = "正解です！ 🎉 " + currentQuizData.explanation;
            quizFeedback.className = "feedback success";
            updateProgress(100);
        } else {
            clickedButton.classList.add("incorrect");
            buttons[currentQuizData.answer].classList.add("correct"); // 正解を表示
            quizFeedback.textContent = "残念、不正解です。 🤔 " + currentQuizData.explanation;
            quizFeedback.className = "feedback error";
            updateProgress(50); // 復習が必要という意味で50%
        }
        
        nextBtn.classList.remove("hidden");
    }

    // 進捗バーの更新
    function updateProgress(percentage) {
        progressBar.style.width = percentage + "%";
        progressText.textContent = `現在の節の達成度: ${percentage}%`;
    }

    // 次へボタンの挙動（拡張用。現状は達成通知のみ）
    nextBtn.addEventListener("click", () => {
        alert("この節の学習は完了です！次のステップに進むか、別の章・教科を選択してください。");
    });
});
</script>
</body>
</html>

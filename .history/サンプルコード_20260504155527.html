<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Friend Station Demo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg-dark: #000000; --bg-panel: #16181c; --bg-hover: #202327; 
            --text-main: #e7e9ea; --text-sub: #71767b; --border: #2f3336; 
            --accent: #2ecc71; --accent-glow: rgba(46, 204, 113, 0.2);
            --danger: #e74c3c; --success: #2ecc71; 
        }
        *{margin:0;padding:0;box-sizing:border-box; -webkit-tap-highlight-color: transparent;} 
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg-dark);color:var(--text-main);height:100vh;overflow:hidden;display:flex;}
        
        .hidden{display:none!important} 
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #3f4347; border-radius: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }

        input,select,textarea { width:100%; padding:14px 16px; margin-bottom:10px; border:1px solid var(--border); border-radius:12px; background:var(--bg-panel); color:var(--text-main); outline:none; font-size:15px; transition:all 0.3s ease; } 
        input:focus,textarea:focus { border-color:var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
        button { padding:12px 20px; border:none; border-radius:12px; background:var(--accent); color:#fff; cursor:pointer; font-weight:600; font-size:15px; transition:all 0.3s ease; } 
        button:hover { transform: translateY(-2px); box-shadow: 0 4px 12px var(--accent-glow); }

        #scr-main{display:flex;width:100%;height:100%;position:relative;}
        .sidebar{width:240px;background:var(--bg-dark);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px;gap:10px;z-index:10;}
        .brand{font-size:22px;font-weight:bold;color:var(--accent);margin-bottom:25px;font-family:cursive;padding-left:10px; display:flex; align-items:center;}
        .nav-btn{display:flex;align-items:center;gap:15px;background:transparent;color:var(--text-main);font-size:18px;padding:14px 15px;justify-content:flex-start;border-radius:25px;cursor:pointer;}
        .nav-btn:hover{background:var(--bg-hover);} .nav-btn.active{font-weight:bold;color:var(--accent);} 

        .list-panel{width:350px;background:var(--bg-dark);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:5;}
        .panel-header{padding:20px;font-size:1.4em;font-weight:bold;border-bottom:1px solid var(--border);background:rgba(0,0,0,0.8);backdrop-filter:blur(10px);position:sticky;top:0;z-index:2;}
        .scroll-area{flex:1;overflow-y:auto;}
        
        .notes-area{padding:20px; border-bottom:1px solid var(--border);}
        .notes-list{display:flex;gap:15px;overflow-x:auto;padding-bottom:10px;}
        .note-item{display:flex;flex-direction:column;align-items:center;width:72px;flex-shrink:0;position:relative;cursor:pointer;gap:6px;}
        .note-img-wrap{width:68px;height:68px;border-radius:50%;background:linear-gradient(45deg, #f09433, #e6683c, #dc2743);padding:3px;display:flex;align-items:center;justify-content:center;}
        .note-item img{width:100%;height:100%;border-radius:50%;object-fit:cover;border:2px solid var(--bg-dark);}
        .note-bubble{position:absolute;top:-5px;right:-5px;background:var(--bg-panel);border:1px solid var(--border);border-radius:15px;padding:4px 8px;font-size:11px;color:var(--text-main);max-width:80px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

        .room-item{padding:15px 20px;display:flex;align-items:center;gap:15px;cursor:pointer;transition:background 0.2s;} 
        .room-item:hover{background:var(--bg-hover);} .room-item img{width:52px;height:52px;border-radius:50%;object-fit:cover;}
        
        .main-panel-container{flex:1;position:relative;background:var(--bg-dark);display:flex;flex-direction:column;}
        .chat-header{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,0.8);backdrop-filter:blur(10px);}
        .chat-box{flex:1;padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:20px;}
        .msg-wrap{display:flex;flex-direction:column;max-width:75%;} .my-msg{align-self:flex-end;} .other-msg{align-self:flex-start;}
        .msg{padding:12px 16px;border-radius:20px;word-wrap:break-word;font-size:15px;}
        .my-msg .msg{background:var(--accent);color:#fff;border-bottom-right-radius:4px;} 
        .other-msg .msg{background:var(--bg-panel);border:1px solid var(--border);border-bottom-left-radius:4px;}
        
        .chat-input-area{padding:15px 20px;border-top:1px solid var(--border);display:flex;gap:12px;align-items:center;}
        .chat-input-area input{margin:0;flex:1;border-radius:24px;}

        .post-card{border-bottom:1px solid var(--border);padding:20px;}
        .post-header{display:flex;align-items:center;gap:12px;margin-bottom:10px;} .post-header img{width:44px;height:44px;border-radius:50%;}
        .post-content{font-size:16px;line-height:1.5;margin-bottom:12px;white-space:pre-wrap;}
        .post-actions{display:flex;gap:20px;color:var(--text-sub);font-size:15px;}

        /* Demo Call Overlay */
        #demo-call-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:1000;display:none;flex-direction:column;align-items:center;justify-content:center;}
        #demo-call-overlay .caller-img{width:120px;height:120px;border-radius:50%;border:4px solid var(--accent);margin-bottom:20px;}
        .call-controls{display:flex;gap:30px;margin-top:40px;}
        .call-btn{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;}
        .call-end{background:var(--danger);}

        @media(max-width: 768px){ .sidebar{width:70px;} .sidebar span, .brand{display:none;} .list-panel{width:100%;} }
    </style>
</head>
<body>

<div id="scr-main">
    <div class="sidebar">
        <div class="brand">Friend Station</div>
        <div class="nav-btn active" onclick="showPanel('home')"><i class="fa-solid fa-house"></i> <span>ホーム</span></div>
        <div class="nav-btn" onclick="showPanel('chat')"><i class="fa-solid fa-message"></i> <span>メッセージ</span></div>
        <div class="nav-btn" onclick="alert('デモ版のため検索は利用できません')"><i class="fa-solid fa-magnifying-glass"></i> <span>検索</span></div>
    </div>

    <div class="list-panel" id="list-panel">
        <!-- Home Panel (Posts) -->
        <div id="panel-home" class="scroll-area">
            <div class="panel-header">タイムライン</div>
            <div id="posts-container"></div>
        </div>

        <!-- Chat Panel (Rooms) -->
        <div id="panel-chat" class="scroll-area hidden">
            <div class="panel-header">メッセージ</div>
            <div class="notes-area">
                <div class="notes-list" id="notes-container"></div>
            </div>
            <div id="rooms-container"></div>
        </div>
    </div>

    <div class="main-panel-container">
        <!-- Chat Area -->
        <div id="chat-view" class="hidden" style="display:flex;flex-direction:column;height:100%;">
            <div class="chat-header">
                <div style="display:flex;align-items:center;gap:12px;">
                    <img id="active-chat-img" src="" style="width:40px;height:40px;border-radius:50%;">
                    <span id="active-chat-name" style="font-weight:bold;"></span>
                </div>
                <div style="display:flex;gap:15px;">
                    <i class="fa-solid fa-phone" style="cursor:pointer;color:var(--accent);" onclick="startDemoCall()"></i>
                    <i class="fa-solid fa-video" style="cursor:pointer;color:var(--accent);" onclick="startDemoCall()"></i>
                </div>
            </div>
            <div class="chat-box" id="chat-messages"></div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="メッセージを入力..." onkeypress="if(event.key==='Enter') sendDemoMsg()">
                <button onclick="sendDemoMsg()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
        <div id="home-view" style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-sub);">
            タイムラインで投稿をチェックしましょう
        </div>
    </div>
</div>

<div id="demo-call-overlay">
    <img class="caller-img" id="call-img" src="">
    <h2 id="call-name"></h2>
    <p style="color:var(--accent); margin-top:10px;">通話中...</p>
    <div class="call-controls">
        <div class="call-btn call-end" onclick="endDemoCall()"><i class="fa-solid fa-phone-slash"></i></div>
    </div>
</div>

<script>
    const demoData = {
        users: [
            { id: 1, name: '佐藤 健太', img: 'https://i.pravatar.cc/150?u=1', note: '放課後スタバ行く人？', online: true },
            { id: 2, name: '田中 美咲', img: 'https://i.pravatar.cc/150?u=2', note: 'テスト勉強つらい😭', online: true },
            { id: 3, name: '鈴木 翔太', img: 'https://i.pravatar.cc/150?u=3', note: '新作のゲーム最高', online: false },
            { id: 4, name: '伊藤 陽菜', img: 'https://i.pravatar.cc/150?u=4', note: 'お腹すいた〜', online: true }
        ],
        posts: [
            { user: '田中 美咲', img: 'https://i.pravatar.cc/150?u=2', content: '今日は文化祭の準備！みんなでお揃いのTシャツ着るの楽しみ✨', likes: 12, time: '10分前' },
            { user: '佐藤 健太', img: 'https://i.pravatar.cc/150?u=1', content: '部活終わった！今日の練習はハードだったわ...。', likes: 8, time: '30分前' },
            { user: '鈴木 翔太', img: 'https://i.pravatar.cc/150?u=3', content: '最近この曲ばっかり聴いてる。めっちゃおすすめ！', likes: 5, time: '1時間前' }
        ],
        messages: {
            1: [ { type: 'other', text: 'お疲れ！今日の数学の宿題どこだっけ？' } ],
            2: [ { type: 'other', text: '明日の朝、駅で待ち合わせね！' } ]
        }
    };

    let activeUserId = null;

    function init() {
        renderPosts();
        renderNotes();
        renderRooms();
    }

    function renderPosts() {
        const container = document.getElementById('posts-container');
        demoData.posts.forEach(post => {
            const el = document.createElement('div');
            el.className = 'post-card';
            el.innerHTML = `
                <div class="post-header">
                    <img src="${post.img}">
                    <div>
                        <div style="font-weight:bold;">${post.user}</div>
                        <div style="font-size:12px;color:var(--text-sub);">${post.time}</div>
                    </div>
                </div>
                <div class="post-content">${post.content}</div>
                <div class="post-actions">
                    <div><i class="fa-regular fa-heart"></i> ${post.likes}</div>
                    <div><i class="fa-regular fa-comment"></i> コメント</div>
                </div>
            `;
            container.appendChild(el);
        });
    }

    function renderNotes() {
        const container = document.getElementById('notes-container');
        demoData.users.forEach(user => {
            const el = document.createElement('div');
            el.className = 'note-item';
            el.innerHTML = `
                <div class="note-img-wrap"><img src="${user.img}"></div>
                <div class="note-bubble">${user.note}</div>
                <div style="font-size:11px;margin-top:4px;">${user.name.split(' ')[0]}</div>
            `;
            container.appendChild(el);
        });
    }

    function renderRooms() {
        const container = document.getElementById('rooms-container');
        demoData.users.forEach(user => {
            const el = document.createElement('div');
            el.className = 'room-item';
            el.onclick = () => openChat(user);
            el.innerHTML = `
                <img src="${user.img}">
                <div>
                    <div style="font-weight:bold;">${user.name}</div>
                    <div style="font-size:13px;color:var(--text-sub);">最新のメッセージがここに表示されます</div>
                </div>
            `;
            container.appendChild(el);
        });
    }

    function showPanel(type) {
        document.getElementById('panel-home').classList.add('hidden');
        document.getElementById('panel-chat').classList.add('hidden');
        document.getElementById('home-view').classList.remove('hidden');
        document.getElementById('chat-view').classList.add('hidden');
        
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        
        if(type === 'home') {
            document.getElementById('panel-home').classList.remove('hidden');
            event.currentTarget.classList.add('active');
        } else {
            document.getElementById('panel-chat').classList.remove('hidden');
            event.currentTarget.classList.add('active');
        }
    }

    function openChat(user) {
        activeUserId = user.id;
        document.getElementById('home-view').classList.add('hidden');
        document.getElementById('chat-view').classList.remove('hidden');
        document.getElementById('active-chat-img').src = user.img;
        document.getElementById('active-chat-name').innerText = user.name;
        
        const msgContainer = document.getElementById('chat-messages');
        msgContainer.innerHTML = '';
        
        const msgs = demoData.messages[user.id] || [];
        msgs.forEach(m => {
            const wrap = document.createElement('div');
            wrap.className = `msg-wrap ${m.type === 'my' ? 'my-msg' : 'other-msg'}`;
            wrap.innerHTML = `<div class="msg">${m.text}</div>`;
            msgContainer.appendChild(wrap);
        });
    }

    function sendDemoMsg() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if(!text) return;

        const msgContainer = document.getElementById('chat-messages');
        const wrap = document.createElement('div');
        wrap.className = 'msg-wrap my-msg';
        wrap.innerHTML = `<div class="msg">${text}</div>`;
        msgContainer.appendChild(wrap);
        input.value = '';
        msgContainer.scrollTop = msgContainer.scrollHeight;

        // Auto reply simulation
        setTimeout(() => {
            const replyWrap = document.createElement('div');
            replyWrap.className = 'msg-wrap other-msg';
            replyWrap.innerHTML = `<div class="msg">これはデモ用の自動返信です！</div>`;
            msgContainer.appendChild(replyWrap);
            msgContainer.scrollTop = msgContainer.scrollHeight;
        }, 1000);
    }

    function startDemoCall() {
        const user = demoData.users.find(u => u.id === activeUserId);
        document.getElementById('call-img').src = user.img;
        document.getElementById('call-name').innerText = user.name;
        document.getElementById('demo-call-overlay').style.display = 'flex';
    }

    function endDemoCall() {
        document.getElementById('demo-call-overlay').style.display = 'none';
    }

    init();
</script>

</body>
</html>

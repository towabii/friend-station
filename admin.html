<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><title>Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-dark: #000000; --bg-panel: #16181c; --bg-hover: #202327; --text-main: #e7e9ea; --text-sub: #71767b; --border: #2f3336; --accent: #2ecc71; --danger: #e74c3c; --success: #2ecc71; }
        *{margin:0;padding:0;box-sizing:border-box;} body{font-family:sans-serif;background:var(--bg-dark);color:var(--text-main);height:100vh;display:flex;}
        .hidden{display:none!important} input{padding:14px;border:1px solid var(--border);border-radius:12px;width:100%;margin-bottom:15px;background:var(--bg-panel);color:var(--text-main);outline:none;}
        button{padding:10px 16px;border:none;border-radius:10px;background:var(--accent);color:#fff;cursor:pointer;font-weight:bold;transition:0.2s;} button:hover{transform:translateY(-2px);}
        .danger{background:var(--danger)} .success{background:var(--success)}
        .login-wrap-container { display:flex; align-items:center; justify-content:center; width:100%; height:100%; } .login-wrap { background:var(--bg-panel); padding:40px; border-radius:20px; width:400px; }
        .sidebar { width: 260px; background: var(--bg-panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 25px 15px; }
        .nav-btn { background: transparent; color: var(--text-main); font-size: 16px; padding: 14px; text-align:left; border-radius: 12px; margin-bottom: 5px; } .nav-btn.active { background: rgba(255,255,255,0.05); color: var(--accent); }
        .main-content { flex: 1; display: flex; flex-direction: column; } .top-bar { padding: 15px 25px; border-bottom: 1px solid var(--border); } .scroll-area { flex: 1; overflow-y: auto; padding: 25px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; } th, td { padding: 16px; text-align: left; border-bottom: 1px solid var(--border); } th { color: var(--text-sub); }
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; } .bg-ok { background: rgba(46, 204, 113, 0.2); color: var(--accent); } .bg-danger { background: rgba(231, 76, 60, 0.2); color: var(--danger); } .bg-warn { background: rgba(241, 196, 15, 0.2); color: #f1c40f; }
    </style>
</head>
<body>

<div id="scr-login" class="login-wrap-container">
    <div class="login-wrap"><h2>Admin Login</h2><input type="password" id="admin-pass" placeholder="パスワード(0406)"><button style="width:100%;" onclick="login()">ログイン</button></div>
</div>

<div id="scr-panel" class="hidden">
    <div class="sidebar">
        <h2 style="color:var(--accent);margin-bottom:20px;"><i class="fa-solid fa-shield-halved"></i> Admin Panel</h2>
        <button class="nav-btn active" onclick="switchTab('users')"><i class="fa-solid fa-users"></i> ユーザー管理</button>
        <button class="nav-btn" onclick="switchTab('msgs')"><i class="fa-solid fa-user-secret"></i> P2Pチャット抽出</button>
        <button class="nav-btn danger" style="margin-top:auto;" onclick="location.reload()">ログアウト</button>
    </div>
    <div class="main-content">
        <div class="top-bar"><h2>ダッシュボード</h2></div>
        <div class="scroll-area">
            <div id="sec-users">
                <h3 style="margin-bottom:15px;">ユーザーアカウント管理</h3>
                <table><thead><tr><th>ID/ユーザー名</th><th>氏名/ニックネーム</th><th>ステータス</th><th>操作</th></tr></thead><tbody id="ui-users"></tbody></table>
            </div>
            <div id="sec-msgs" class="hidden">
                <h3 style="margin-bottom:10px;">P2Pチャット履歴抽出</h3>
                <p style="color:var(--text-sub);margin-bottom:20px;">※ 履歴はサーバー上に存在しないため、オンラインの端末から直接IndexedDBのデータを引き抜きます。</p>
                <div id="p2p-users-list" style="margin-bottom:20px; background:var(--bg-panel); border-radius:12px; border:1px solid var(--border); padding:10px;"></div>
                <div style="background:#000;padding:20px;border-radius:12px;height:400px;overflow-y:auto;border:1px solid var(--border);" id="history-content">抽出された履歴がここに表示されます...</div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyDVTNVO9gcXKQkauOF3NNZ36d2voyvGscA", 
        databaseURL: "https://study-station-8f0aa-default-rtdb.asia-southeast1.firebasedatabase.app", 
        projectId: "study-station-8f0aa" 
    };
    const dbFirebase = getDatabase(initializeApp(firebaseConfig));
    const adminId = "admin_" + Date.now();
    
    let allUsers = {}; let onlineStatus = {};

    window.login = () => { if(document.getElementById('admin-pass').value === '0406') { document.getElementById('scr-login').classList.add('hidden'); document.getElementById('scr-panel').classList.remove('hidden'); loadAll(); } else alert("パスワードエラー"); };
    window.switchTab = tab => { document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active')); event.target.classList.add('active'); document.getElementById('sec-users').classList.add('hidden'); document.getElementById('sec-msgs').classList.add('hidden'); document.getElementById('sec-'+tab).classList.remove('hidden'); };

    function loadAll() {
        onValue(ref(dbFirebase, 'users'), snap => { allUsers = snap.val() || {}; renderUsers(); });
        onValue(ref(dbFirebase, 'presence'), snap => { onlineStatus = snap.val() || {}; renderUsers(); });
        
        onChildAdded(ref(dbFirebase, `admin_res/${adminId}`), snap => {
            const msgs = snap.val() || [];
            document.getElementById('history-content').innerHTML = msgs.sort((a,b)=>a.time-b.time).map(m => `<div><span style="color:#71767b;">[${new Date(m.time).toLocaleString()}]</span> <b>${m.senderName}</b> -> <b>${m.targetName}</b>: ${m.type==='image'?'[画像送信]':m.text.replace(/</g,"&lt;")}</div>`).join('') || '履歴なし';
            remove(snap.ref); // 受信したら即削除
        });
    }

    function renderUsers() {
        document.getElementById('ui-users').innerHTML = Object.values(allUsers).map(u => {
            const badge = u.is_banned ? `<span class="badge bg-danger">停止中</span>` : (u.status === 'pending' ? `<span class="badge bg-warn">承認待ち</span>` : `<span class="badge bg-ok">承認済</span>`);
            const btn = u.status === 'pending' ? `<button class="success" onclick="actionUser('approve','${u.id}')">承認する</button>` : (u.is_banned ? `<button class="success" onclick="actionUser('unban','${u.id}')">解除</button>` : `<button class="danger" onclick="actionUser('ban','${u.id}')">停止</button>`);
            return `<tr><td>@${u.username}</td><td>${u.first_name} ${u.last_name} (${u.nickname})</td><td>${badge}</td><td>${btn} <button class="danger" onclick="actionUser('delete','${u.id}')">削除</button></td></tr>`;
        }).join('');
        
        document.getElementById('p2p-users-list').innerHTML = Object.values(allUsers).filter(u => u.status === 'approved').map(u => {
            const isOnline = onlineStatus[u.id]; const btn = isOnline ? `<button onclick="reqHistory('${u.id}')" style="padding:6px 12px;">P2P抽出</button>` : `<button disabled style="padding:6px 12px;background:#555;">オフライン</button>`;
            return `<div style="padding:10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;"><span>${u.nickname} (@${u.username}) <b style="color:${isOnline?'var(--accent)':'var(--text-sub)'};margin-left:10px;">${isOnline?'オンライン':'オフライン'}</b></span>${btn}</div>`;
        }).join('');
    }

    window.actionUser = (type, id) => { 
        if(confirm("実行しますか？")) { 
            if(type==='approve') set(ref(dbFirebase, `users/${id}/status`), 'approved');
            if(type==='ban') set(ref(dbFirebase, `users/${id}/is_banned`), 1);
            if(type==='unban') set(ref(dbFirebase, `users/${id}/is_banned`), 0);
            if(type==='delete') remove(ref(dbFirebase, `users/${id}`));
        } 
    };
    
    window.reqHistory = uid => { document.getElementById('history-content').innerHTML = "P2P通信確立中... 端末から抽出しています..."; set(ref(dbFirebase, `admin_cmd/${uid}/${Date.now()}`), { cmd: 'get_history', admin_id: adminId }); };
</script>
</body>
</html>
